name: Validate JSONC Files
on:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PopTracker/pack-checker-action@v1
        with:
          strict: true
          schema: path/to/schema
          pack: path/to/pack
          check-legacy-compat: true
