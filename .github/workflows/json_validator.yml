name: Validate JSONC Files

on:
  pull_request:

jobs:
  validate-jsonc:
    name: Validate JSONC files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install json5 (JSONC parser)
        run: npm install -g json5

      - name: Validate all JSON files as JSONC
        run: |
          FAILED=0

          while IFS= read -r -d '' file; do
            if json5 "$file" > /dev/null 2>&1; then
              echo "OK: $file"
            else
              echo "FAILED: $file"
              json5 "$file" || true
              FAILED=1
            fi
          done < <(find . -name '*.json' -not -path '*/.git/*' -print0)

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "One or more JSON files are invalid (JSONC parsing failed)."
            exit 1
          fi
